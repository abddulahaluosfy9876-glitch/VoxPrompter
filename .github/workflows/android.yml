name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check_local_gradle:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Fix Wrapper Permissions
      run: |
        # التأكد من إعطاء الصلاحية لملف التشغيل المحلي للمشروع
        chmod +x gradlew

    - name: Verify Gradle Environment
      run: |
        # تشغيل فحص نسبي للنسخة للتأكد من أن البيئة المحلية تستجيب بنجاح
        ./gradlew --version --no-daemon
        
