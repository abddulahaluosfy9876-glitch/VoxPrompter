name: VoxPrompter Android CI - Mobile Autopilot

on:
  push:
    branches: [ "main" ]

jobs:
  bypass_and_force_wrapper:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Bot: Generated Gradle Wrapper')"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # الحل المضمون: بناء وصناعة ملفات الـ Wrapper عبر أوامر النظام مباشرة دون تشغيل الجرادل المكسور
    - name: Manually Inject Official Gradle Wrapper Files
      run: |
        # 1. إنشاء المجلدات المطلوبة
        mkdir -p gradle/wrapper
        
        # 2. تحميل ملف الـ Jar القياسي مباشرة من مستودع جيرادل الرسمي
        curl -Lo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar
        
        # 3. كتابة نصوص الإعدادات المعتمدة للإصدار المستقر 8.7
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # 4. تحميل سكربت التشغيل القياسي gradlew وإعطاؤه صلاحية التنفيذ
        curl -Lo gradlew https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradlew
        chmod +x gradlew

    # رفع الملفات المتولدة فوراً إلى مستودعك لتثبيت النظام
    - name: Commit and Push Wrapper Back to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add gradlew gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
        git commit -m "Bot: Generated Gradle Wrapper for Mobile Workflow" || echo "No changes to commit"
        git push origin main
        
