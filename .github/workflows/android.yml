name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_with_android_env:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # تأمين متطلبات الأندرويد أولاً لضمان نجاح الخطوات التالية
    - name: Setup Android SDK Environment
      uses: android-actions/setup-android@v3

    # الآن نستخدم أداة الـ Gradle الرسمية بعد أن أصبحت البيئة جاهزة
    - name: Setup Gradle Official Action
      uses: gradle/actions/setup-gradle@v3

    # توليد وتشغيل الـ Wrapper بأمان
    - name: Generate Project Wrapper
      run: gradle wrapper

    - name: Verify Environment Status
      run: |
        chmod +x gradlew
        ./gradlew --version --no-daemon
        
