name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # تطبيق بروتوكول جيت هاب: بناء الواجهة عبر تمرير الأبعاد أثناء الإضافة فقط (Zero Property Modification)
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست افتراضي نقي وثابت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كود كوتلن نقي يتجنب تعديل layoutParams تماماً لمنع أخطاء الثوابت
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.graphics.Color
        import android.graphics.Typeface
        import android.os.Bundle
        import android.view.Gravity
        import android.widget.LinearLayout
        import android.widget.ScrollView
        import android.widget.TextView

        class MainActivity : Activity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                // 1. بناء الحاوية الرئيسية الخلفية
                val mainLayout = LinearLayout(this)
                mainLayout.orientation = LinearLayout.VERTICAL
                mainLayout.setBackgroundColor(Color.BLACK)
                
                val mainParams = LinearLayout.LayoutParams(
                    LinearLayout.LayoutParams.MATCH_PARENT,
                    LinearLayout.LayoutParams.MATCH_PARENT
                )

                // 2. بناء حاوية التمرير المرنة
                val scrollView = ScrollView(this)
                val scrollParams = LinearLayout.LayoutParams(
                    LinearLayout.LayoutParams.MATCH_PARENT,
                    LinearLayout.LayoutParams.MATCH_PARENT
                )

                // 3. بناء وتجهيز عنصر النص (بدون لمس الـ layoutParams الخاصة به)
                val textView = TextView(this)
                textView.text = "مرحباً بك في VoxPrompter!\n\nتم إرساء حجر الأساس الثاني بنجاح.\n\nالآن تم حقن النص وتمرير الأبعاد بالطريقة الرسمية الصافية لمنع أخطاء السيرفر."
                textView.textSize = 26f
                textView.setTextColor(Color.WHITE)
                textView.gravity = Gravity.CENTER_HORIZONTAL
                textView.typeface = Typeface.DEFAULT_BOLD
                textView.lineSpacingMultiplier = 1.3f

                val textParams = LinearLayout.LayoutParams(
                    LinearLayout.LayoutParams.MATCH_PARENT,
                    LinearLayout.LayoutParams.WRAP_CONTENT
                )
                textParams.setMargins(40, 80, 40, 80)

                // 4. السحر الهندسي الحقيقي: تمرير الأبعاد كمعاملات داخل الدالة لضمان الاستقرار الحتمي
                scrollView.addView(textView, textParams)
                mainLayout.addView(scrollView, scrollParams)
                
                setContentView(mainLayout, mainParams)
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
