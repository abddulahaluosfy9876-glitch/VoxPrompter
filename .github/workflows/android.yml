name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # حقن الحجر الرابع عشر: صندوق النصوص التفاعلي وأدوات اللصق والاستيراد الذكي
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. المانيفست الرسمي للتطبيق
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <service
                    android:name="com.example.voxprompter.FloatingService"
                    android:enabled="true"
                    android:exported="false" />
                
                <provider
                    android:name="androidx.core.content.FileProvider"
                    android:authorities="com.example.voxprompter.fileprovider"
                    android:exported="false"
                    android:grantUriPermissions="true">
                    <meta-data
                        android:name="android.support.FILE_PROVIDER_PATHS"
                        android:resource="@xml/file_paths" />
                </provider>
            </application>
        </manifest>
        EOF

        # 2. ملف مسارات الحماية
        mkdir -p app/src/main/res/xml
        cat << 'EOF' > app/src/main/res/xml/file_paths.xml
        <?xml version="1.0" encoding="utf-8"?>
        <paths>
            <external-cache-path name="external_cache" path="." />
            <cache-path name="internal_cache" path="." />
        </paths>
        EOF

        # 3. ملف الموارد المشترك
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 4. كود كوتلن (1): محرك المزامنة التكيفية العائم (FloatingService) المستقر
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/FloatingService.kt
        package com.example.voxprompter

        import android.app.Service
        import android.content.Context
        import android.content.Intent
        import android.graphics.Color
        import android.graphics.PixelFormat
        import android.graphics.Typeface
        import android.os.*
        import android.speech.RecognitionListener
        import android.speech.RecognizerIntent
        import android.speech.SpeechRecognizer
        import android.view.*
        import android.widget.*

        class FloatingService : Service() {
            private var windowManager: WindowManager? = null
            private var floatingLayout: LinearLayout? = null
            private var floatingScrollView: ScrollView? = null
            private val scrollHandler = Handler(Looper.getMainLooper())
            private var scrollRunnable: Runnable? = null
            private var scrollDelay: Long = 100 
            private var speechRecognizer: SpeechRecognizer? = null

            override fun onBind(intent: Intent?): IBinder? = null

            override fun onCreate() {
                super.onCreate()
                windowManager = getSystemService(Context.WINDOW_SERVICE) as WindowManager

                floatingLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.parseColor("#EE000000"))
                    setPadding(20, 20, 20, 20)
                }

                floatingScrollView = ScrollView(this).apply {
                    layoutParams = LinearLayout.LayoutParams(-1, 300)
                }

                val textView = TextView(this).apply {
                    text = "VoxPrompter Sync: تحدث معي.. سأتحرك مع نبرة صوتك!\n\nنظام التزامن الذكي يراقب قوة صوتك الآن ويقوم بتسريع أو إبطاء حركة النص تلقائياً ليتناسب تماماً مع سرعة إلقائك."
                    setTextColor(Color.WHITE)
                    textSize = 16f
                    setPadding(10, 10, 10, 500)
                }
                
                floatingScrollView?.addView(textView)
                floatingLayout?.addView(floatingScrollView)

                speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this)
                val intent = Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH).apply {
                    putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM)
                    putExtra(RecognizerIntent.EXTRA_PARTIAL_RESULTS, true)
                }

                speechRecognizer?.setRecognitionListener(object : RecognitionListener {
                    override fun onReadyForSpeech(params: Bundle?) {}
                    override fun onBeginningOfSpeech() {}
                    override fun onRmsChanged(rmsdB: Float) {
                        if (rmsdB > 2) {
                            scrollDelay = Math.max(10, (120 - (rmsdB * 10)).toLong())
                        } else {
                            scrollDelay = 200 
                        }
                    }
                    override fun onBufferReceived(buffer: ByteArray?) {}
                    override fun onEndOfSpeech() {}
                    override fun onError(error: Int) { speechRecognizer?.startListening(intent) }
                    override fun onResults(results: Bundle?) {}
                    override fun onPartialResults(partialResults: Bundle?) {}
                    override fun onEvent(eventType: Int, params: Bundle?) {}
                })
                speechRecognizer?.startListening(intent)

                scrollRunnable = object : Runnable {
                    override fun run() {
                        floatingScrollView?.smoothScrollBy(0, 5)
                        scrollHandler.postDelayed(this, scrollDelay)
                    }
                }
                scrollHandler.postDelayed(scrollRunnable!!, 500)

                val params = WindowManager.LayoutParams(
                    WindowManager.LayoutParams.MATCH_PARENT, 400,
                    if (Build.VERSION.SDK_INT >= 26) WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY else WindowManager.LayoutParams.TYPE_PHONE,
                    WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT
                ).apply { gravity = Gravity.TOP or Gravity.START }
                
                windowManager?.addView(floatingLayout, params)
            }

            override fun onDestroy() {
                speechRecognizer?.destroy()
                scrollRunnable?.let { scrollHandler.removeCallbacks(it) }
                floatingLayout?.let { windowManager?.removeView(it) }
                super.onDestroy()
            }
        }
        EOF

        # 5. كود كوتلن (2): النشاط الرئيسي المحدث بالكامل مع صناديق النصوص وأزرار اللصق والاستيراد (.txt)
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.content.ClipboardManager
        import android.content.Context
        import android.content.Intent
        import android.graphics.Color
        import android.graphics.Typeface
        import android.media.MediaRecorder
        import android.net.Uri
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.provider.Settings
        import android.view.Gravity
        import android.widget.Button
        import android.widget.EditText
        import android.widget.LinearLayout
        import android.widget.ScrollView
        import android.widget.Toast
        import androidx.core.content.FileProvider
        import java.io.BufferedReader
        import java.io.File
        import java.io.InputStreamReader

        class MainActivity : Activity() {

            private var prompterInput: EditText? = null
            private var audioRecorder: MediaRecorder? = null
            private var audioFile: File? = null
            private var isRecording = false

            private val PICK_TXT_FILE = 101

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                // الحاوية الرئيسية الواجهة
                val mainLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.BLACK)
                    setPadding(30, 40, 30, 40)
                }

                // شريط الأدوات العلوي (اللصق والاستيراد)
                val toolbarLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.HORIZONTAL
                    weightSum = 2f
                }

                val pasteButton = Button(this).apply {
                    text = "لصق النص 📋"
                    setBackgroundColor(Color.parseColor("#424242"))
                    setTextColor(Color.WHITE)
                    layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f).apply {
                        rightMargin = 10
                    }
                    setOnClickListener { pasteFromClipboard() }
                }
                toolbarLayout.addView(pasteButton)

                val importButton = Button(this).apply {
                    text = "استيراد ملف TXT 📂"
                    setBackgroundColor(Color.parseColor("#00695C"))
                    setTextColor(Color.WHITE)
                    layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
                    setOnClickListener { openFilePicker() }
                }
                toolbarLayout.addView(importButton)
                mainLayout.addView(toolbarLayout)

                // صندوق إدخال وتعديل النصوص المتقدم
                prompterInput = EditText(this).apply {
                    hint = "اكتب، الصق، أو استورد النص الذي تريد قراءته هنا..."
                    setHintTextColor(Color.GRAY)
                    setTextColor(Color.WHITE)
                    textSize = 20f
                    gravity = Gravity.TOP or Gravity.START
                    setBackgroundColor(Color.parseColor("#121212"))
                    setPadding(30, 30, 30, 30)
                    layoutParams = LinearLayout.LayoutParams(
                        LinearLayout.LayoutParams.MATCH_PARENT,
                        0,
                        1f
                    ).apply {
                        topMargin = 20
                        bottomMargin = 20
                    }
                }
                mainLayout.addView(prompterInput)

                // شريط الأزرار السفلي (التسجيل والملقن العائم)
                val actionLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                }

                val actionButton = Button(this).apply {
                    text = "إيقاف ومشاركة الصوت 📤"
                    setBackgroundColor(Color.parseColor("#E53935"))
                    setTextColor(Color.WHITE)
                    setTypeface(Typeface.DEFAULT_BOLD)
                    textSize = 18f
                    layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = 15 }
                    setOnClickListener { stopRecordingAndShare() }
                }
                actionLayout.addView(actionButton)

                val overlayButton = Button(this).apply {
                    text = "تفعيل الملقن العائم 📱"
                    setBackgroundColor(Color.parseColor("#1E88E5"))
                    setTextColor(Color.WHITE)
                    setTypeface(Typeface.DEFAULT_BOLD)
                    textSize = 18f
                    setOnClickListener {
                        if (Settings.canDrawOverlays(this@MainActivity)) {
                            startService(Intent(this@MainActivity, FloatingService::class.java))
                        } else {
                            val intent = Intent(
                                Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                Uri.parse("package:$packageName")
                            )
                            startActivity(intent)
                        }
                    }
                }
                actionLayout.addView(overlayButton)
                mainLayout.addView(actionLayout)

                setContentView(mainLayout)
                audioFile = File(externalCacheDir ?: cacheDir, "VoxPrompter_Record.amr")
            }

            private fun pasteFromClipboard() {
                val clipboard = getSystemService(Context.CLIPBOARD_SERVICE) as ClipboardManager
                if (clipboard.hasPrimaryClip()) {
                    val item = clipboard.primaryClip?.getItemAt(0)
                    val pasteData = item?.text?.toString() ?: ""
                    if (pasteData.isNotEmpty()) {
                        prompterInput?.setText(pasteData)
                        Toast.makeText(this, "تم لصق النص بنجاح!", Toast.LENGTH_SHORT).show()
                    }
                } else {
                    Toast.makeText(this, "الحافظة فارغة!", Toast.LENGTH_SHORT).show()
                }
            }

            private fun openFilePicker() {
                val intent = Intent(Intent.ACTION_GET_CONTENT).apply {
                    type = "text/plain"
                    addCategory(Intent.CATEGORY_OPENABLE)
                }
                startActivityForResult(Intent.createChooser(intent, "اختر ملف النص"), PICK_TXT_FILE)
            }

            override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                super.onActivityResult(requestCode: Int, resultCode: Int, data: Intent?)
                if (requestCode == PICK_TXT_FILE && resultCode == Activity.RESULT_OK) {
                    data?.data?.let { uri ->
                        readTextFromUri(uri)
                    }
                }
            }

            private fun readTextFromUri(uri: Uri) {
                try {
                    contentResolver.openInputStream(uri)?.use { inputStream ->
                        BufferedReader(InputStreamReader(inputStream)).use { reader ->
                            val stringBuilder = StringBuilder()
                            var line: String?
                            while (reader.readLine().also { line = it } != null) {
                                stringBuilder.append(line).append("\n")
                            }
                            prompterInput?.setText(stringBuilder.toString())
                            Toast.makeText(this, "تم استيراد الملف النصي بنجاح!", Toast.LENGTH_SHORT).show()
                        }
                    }
                } catch (e: Exception) {
                    Toast.makeText(this, "فشل في قراءة الملف!", Toast.LENGTH_SHORT).show()
                }
            }

            private fun stopRecordingAndShare() {
                if (isRecording) {
                    try {
                        audioRecorder?.stop()
                        audioRecorder?.release()
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                    audioRecorder = null
                    isRecording = false
                }

                audioFile?.let { file ->
                    if (file.exists()) {
                        try {
                            val fileUri: Uri = FileProvider.getUriForFile(
                                this,
                                "com.example.voxprompter.fileprovider",
                                file
                            )
                            val shareIntent = Intent(Intent.ACTION_SEND).apply {
                                type = "audio/amr"
                                putExtra(Intent.EXTRA_STREAM, fileUri)
                                addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)
                            }
                            startActivity(Intent.createChooser(shareIntent, "شارك تسجيلك الصوتي عبر:"))
                        } catch (e: Exception) {
                            e.printStackTrace()
                        }
                    }
                }
            }

            override fun onResume() {
                super.onResume()
                try {
                    audioRecorder = MediaRecorder().apply {
                        setAudioSource(MediaRecorder.AudioSource.MIC)
                        setOutputFormat(MediaRecorder.OutputFormat.AMR_NB)
                        setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB)
                        setOutputFile(audioFile?.absolutePath)
                        prepare()
                        start()
                    }
                    isRecording = true
                } catch (e: Exception) {
                    e.printStackTrace()
                }
            }

            override fun onPause() {
                super.onPause()
                if (isRecording) {
                    try {
                        audioRecorder?.stop()
                        audioRecorder?.release()
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                    audioRecorder = null
                    isRecording = false
                }
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
