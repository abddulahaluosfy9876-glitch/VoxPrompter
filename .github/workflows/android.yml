name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_stable_wrapper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # الأداة الرسمية والآمنة من GitHub لإدارة وتوليد الـ Gradle بشكل مستقل
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # تشغيل أمر التوليد النقي الآن
    - name: Generate Project Wrapper
      run: gradle wrapper

    # التحقق من الصلاحيات والنسخة
    - name: Verify Wrapper Health
      run: |
        chmod +x gradlew
        ./gradlew --version --no-daemon
        
