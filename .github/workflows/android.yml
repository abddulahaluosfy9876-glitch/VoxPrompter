# قرار صحيح: اسم واضح يظهر في تبويب الـ Actions
name: VoxPrompter Android CI

# وقت ومكان صحيح: تحديد متى يستيقظ السيرفر بدقة بناءً على التوثيق
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # اسم المهمة الأساسية المعزولة
  validate_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # استخدام الأداة الرسمية الموصى بها لإدارة الجرادل سحابياً
    - name: Setup Gradle Official Action
      uses: gradle/actions/setup-gradle@v3

    # تشغيل الفحص النقي للبيئة
    - name: Run Basic Environment Check
      run: gradle --version
      
