name: VoxPrompter - Emergency Cleanup

on:
  push:
    branches: [ "main" ]

jobs:
  cleanup_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Force Delete Distorted File
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # أمر الحذف الصارم للملَف المشوه الذي ينتهي بنقطة
        rm -f "gradlew."
        
        git add .
        git commit -m "Bot: Clean up and remove distorted gradlew. file" || echo "No files to remove"
        git push origin main
        
