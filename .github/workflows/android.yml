name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ] # سيبدأ البناء تلقائياً فور تعديل أو رفع كود على هذا الفرع
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create Gradle Wrapper
      run: npm install -g corepack && gradle wrapper --gradle-version 8.4

    - name: Change wrapper permissions
      run: chmod +x gradlew || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Preview-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
