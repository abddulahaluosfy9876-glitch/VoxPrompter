name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # خطوة حقن حجر الأساس: بناء هيكل بسيط وخالٍ من التعقيدات
    - name: Baseline Clean Injection
      run: |
        find . -name "Main.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. المانيفست الأساسي والافتراضي
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملفات الموارد الأساسية المستقرة
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/styles.xml
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
            </style>
        </resources>
        EOF

        # 3. كود واجهة حجر الأساس: نص واضح داخل حاوية مستقرة جداً
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.graphics.Color
        import android.graphics.Typeface
        import android.os.Bundle
        import android.view.Gravity
        import android.view.ViewGroup
        import android.widget.LinearLayout
        import android.widget.TextView
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                // إنشاء واجهة أساسية سوداء مستقرة للغاية
                val mainLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.parseColor("#121212"))
                    layoutParams = LinearLayout.LayoutParams(
                        LinearLayout.LayoutParams.MATCH_PARENT,
                        LinearLayout.LayoutParams.MATCH_PARENT
                    )
                    gravity = Gravity.CENTER
                }

                val textView = TextView(this).apply {
                    layoutParams = LinearLayout.LayoutParams(
                        LinearLayout.LayoutParams.MATCH_PARENT,
                        LinearLayout.LayoutParams.WRAP_CONTENT
                    ).apply {
                        setMargins(50, 50, 50, 50)
                    }
                    text = "مرحباً بك في VoxPrompter!\n\nتم وضع حجر الأساس بنجاح والتطبيق يعمل الآن باستقرار كامل.\n\nفي الخطوة القادمة سنضيف التمرير التلقائي."
                    textSize = 24f
                    setTextColor(Color.WHITE)
                    gravity = Gravity.CENTER
                    typeface = Typeface.DEFAULT_BOLD
                    lineSpacingMultiplier = 1.3f
                }

                mainLayout.addView(textView)
                setContentView(mainLayout)
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
