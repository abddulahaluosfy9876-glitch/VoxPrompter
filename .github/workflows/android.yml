name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate_environment:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # خطوة إكمال النقص: تهيئة أدوات ومستودعات الأندرويد الرسمية داخل السيرفر أولاً
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # الآن نقوم بفحص النظام الداخلي والتأكد من سلامة ملفات الإعدادات
    - name: Verify Environment Completeness
      run: |
        echo "=== فحص اكتمال المتطلبات ==="
        if [ -f "settings.gradle.kts" ]; then echo "✅ settings.gradle.kts موجود"; else echo "❌ مفقود"; fi
        if [ -f "build.gradle.kts" ]; then echo "✅ build.gradle.kts موجود"; else echo "❌ مفقود"; fi
        
