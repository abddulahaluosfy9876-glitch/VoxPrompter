name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # حقن الحجر الخامس: دمج ميزة التمرير التلقائي السلس بأمان كامل
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست افتراضي نقي وثابت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كود كوتلن: تفعيل محرك التمرير التلقائي عبر فصل منطق الحركة بأمان
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.graphics.Color
        import android.graphics.Typeface
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.view.Gravity
        import android.widget.ScrollView
        import android.widget.TextView

        class MainActivity : Activity() {

            private var scrollerView: ScrollView? = null
            private val mainHandler = Handler(Looper.getMainLooper())
            
            // تعريف المرجع كـ var قابل للتأجيل لمنع اصطدام المترجم أثناء التهيئة البدئية
            private var scrollRunnable: Runnable? = null

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                val mainScrollView = ScrollView(this)
                mainScrollView.setBackgroundColor(Color.BLACK)
                scrollerView = mainScrollView
                
                val prompterTextView = TextView(this)
                prompterTextView.text = "مرحباً بك في VoxPrompter!\n\nهذا هو النص الذكي المنسق بجودة عالية لتسهيل القراءة.\n\nتم ضبط حجم الخط ليكون كبيراً وواضحاً، وتم توسيع الفراغات بين الأسطر لراحة العين أثناء الإلقاء والتسجيل الصوتي.\n\nالآن، بعد استقرار الواجهة، يعمل محرك الحركة التلقائية على تمرير الأسطر برفق ونعومة للأعلى.\n\nفي الخطوات القادمة، سنضيف ميزة التسجيل الصوتي النقي وحفظ الملفات مباشرة على جهازك."
                
                prompterTextView.setTextSize(28f)
                prompterTextView.setTextColor(Color.WHITE)
                prompterTextView.setGravity(Gravity.CENTER_HORIZONTAL)
                prompterTextView.setTypeface(Typeface.DEFAULT_BOLD)
                prompterTextView.setLineSpacing(0f, 1.5f)
                prompterTextView.setPadding(45, 100, 45, 800)

                mainScrollView.addView(prompterTextView)
                setContentView(mainScrollView)

                // بناء التكرار البرمجي للحركة التلقائية بشكل معزول وآمن
                scrollRunnable = object : Runnable {
                    override fun run() {
                        scrollerView?.smoothScrollBy(0, 3) // تحريك بمقدار 3 بكسل للوصول لنعومة حركة فائقة
                        scrollRunnable?.let { mainHandler.postDelayed(it, 40) }
                    }
                }
            }

            override fun onResume() {
                super.onResume()
                // بدء التحريك التلقائي بعد ثانية واحدة من فتح التطبيق لإعطاء المستخدم مهلة للاستعداد
                scrollRunnable?.let { mainHandler.postDelayed(it, 1000) }
            }

            override fun onPause() {
                super.onPause()
                // إيقاف العداد فوراً عند الخروج لحماية بطارية وذاكرة الهاتف
                scrollRunnable?.let { mainHandler.removeCallbacks(it) }
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
