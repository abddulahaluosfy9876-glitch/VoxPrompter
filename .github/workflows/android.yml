name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # حقن الحجر الحادي عشر: دمج محرك التمرير التلقائي الذكي داخل نافذة الملقن العائم المصغر
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. المانيفست الرسمي للتطبيق مع كامل الصلاحيات والخدمات
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <service
                    android:name="com.example.voxprompter.FloatingService"
                    android:enabled="true"
                    android:exported="false" />
                
                <provider
                    android:name="androidx.core.content.FileProvider"
                    android:authorities="com.example.voxprompter.fileprovider"
                    android:exported="false"
                    android:grantUriPermissions="true">
                    <meta-data
                        android:name="android.support.FILE_PROVIDER_PATHS"
                        android:resource="@xml/file_paths" />
                </provider>
            </application>
        </manifest>
        EOF

        # 2. ملف مسارات الحماية ومشاركة الملفات الصافية
        mkdir -p app/src/main/res/xml
        cat << 'EOF' > app/src/main/res/xml/file_paths.xml
        <?xml version="1.0" encoding="utf-8"?>
        <paths>
            <external-cache-path name="external_cache" path="." />
            <cache-path name="internal_cache" path="." />
        </paths>
        EOF

        # 3. ملف الموارد المشترك
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 4. كود كوتلن (1): حقن محرك الـ Auto-Scroll والـ ScrollView التلقائي داخل النافذة العائمة
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/FloatingService.kt
        package com.example.voxprompter

        import android.app.Service
        import android.content.Context
        import android.content.Intent
        import android.graphics.Color
        import android.graphics.PixelFormat
        import android.graphics.Typeface
        import android.os.Build
        import android.os.Handler
        import android.os.IBinder
        import android.os.Looper
        import android.view.Gravity
        import android.view.MotionEvent
        import android.view.View
        import android.view.WindowManager
        import android.widget.Button
        import android.widget.LinearLayout
        import android.widget.ScrollView
        import android.widget.TextView

        class FloatingService : Service() {

            private var windowManager: WindowManager? = null
            private var floatingLayout: LinearLayout? = null
            
            // تهيئة متغيرات التمرير التلقائي لضمان المزامنة وحركة النص الانسيابية
            private var floatingScrollView: ScrollView? = null
            private val scrollHandler = Handler(Looper.getMainLooper())
            private var scrollRunnable: Runnable? = null

            override fun onBind(intent: Intent?): IBinder? = null

            override fun onCreate() {
                super.onCreate()
                windowManager = getSystemService(Context.WINDOW_SERVICE) as WindowManager

                floatingLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.parseColor("#CC000000"))
                    setPadding(25, 25, 25, 25)
                }

                // 1. إنشاء حاوية التمرير الطولية برمجياً وتحديد وزنها داخل التصميم العائم
                val scrollView = ScrollView(this).apply {
                    layoutParams = LinearLayout.LayoutParams(
                        LinearLayout.LayoutParams.MATCH_PARENT,
                        250 // تخصيص ارتفاع مريح لعرض النص داخل الشاشة المصغرة
                    )
                }
                floatingScrollView = scrollView

                // 2. نص الملقن الطويل والمتحرك داخل الشاشة العائمة
                val floatingText = TextView(this).apply {
                    text = "نص الملقن العائم يتحرك الآن تلقائياً أمامك..\n\nيمكنك الآن الخروج وتصفح أي تطبيق آخر أو فتح كاميرا الهاتف للتصوير، بينما يتحرك هذا النص بسلاسة تامة لتقرأ منه بحرية وبدون تشتت.\n\nاضغط على زر الإغلاق بالأسفل للعودة للتطبيق في أي وقت."
                    setTextColor(Color.WHITE)
                    textSize = 18f
                    typeface = Typeface.DEFAULT_BOLD
                    gravity = Gravity.CENTER_HORIZONTAL
                    setLineSpacing(0f, 1.4f)
                    setPadding(10, 10, 10, 400) // حواف سفلية لمنع انقطاع النص أثناء التحريك
                }
                scrollView.addView(floatingText)
                floatingLayout?.addView(scrollView)

                // 3. زر إغلاق الخدمة العائمة والعودة للواجهة الرئيسية
                val closeButton = Button(this).apply {
                    text = "إغلاق الملقن ✖"
                    setBackgroundColor(Color.parseColor("#E53935"))
                    setTextColor(Color.WHITE)
                    setTypeface(Typeface.DEFAULT_BOLD)
                    setOnClickListener { stopSelf() }
                }
                
                val btnParams = LinearLayout.LayoutParams(
                    LinearLayout.LayoutParams.MATCH_PARENT,
                    LinearLayout.LayoutParams.WRAP_CONTENT
                ).apply {
                    topMargin = 15
                }
                closeButton.layoutParams = btnParams
                floatingLayout?.addView(closeButton)

                val layoutFlag = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                } else {
                    WindowManager.LayoutParams.TYPE_PHONE
                }

                val params = WindowManager.LayoutParams(
                    WindowManager.LayoutParams.MATCH_PARENT,
                    480, // تعديل الارتفاع الكلي ليناسب التصميم والمحرك الجديد
                    layoutFlag,
                    WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                    PixelFormat.TRANSLUCENT
                ).apply {
                    gravity = Gravity.TOP or Gravity.START
                    x = 0
                    y = 200
                }

                // ميزة سحب وتحريك النافذة يدوياً لحماية رؤية التطبيقات الأخرى
                floatingLayout?.setOnTouchListener(object : View.OnTouchListener {
                    private var initialX = 0
                    private var initialY = 0
                    private var initialTouchX = 0f
                    private var initialTouchY = 0f

                    override fun onTouch(v: View?, event: MotionEvent?): Boolean {
                        if (event == null) return false
                        when (event.action) {
                            MotionEvent.ACTION_DOWN -> {
                                initialX = params.x
                                initialY = params.y
                                initialTouchX = event.rawX
                                initialTouchY = event.rawY
                                return true
                            }
                            MotionEvent.ACTION_MOVE -> {
                                params.x = initialX + (event.rawX - initialTouchX).toInt()
                                params.y = initialY + (event.rawY - initialTouchY).toInt()
                                windowManager?.updateViewLayout(floatingLayout, params)
                                return true
                            }
                        }
                        return false
                    }
                })

                windowManager?.addView(floatingLayout, params)

                // 4. تشغيل محرك الحركة التلقائية الآمن فور ظهور الشاشة العائمة
                scrollRunnable = object : Runnable {
                    override fun run() {
                        floatingScrollView?.smoothScrollBy(0, 2)
                        scrollRunnable?.let { scrollHandler.postDelayed(it, 50) }
                    }
                }
                scrollHandler.postDelayed(scrollRunnable!!, 1500) // بدء التمرير بعد ثانية ونصف لراحة عين القارئ
            }

            override fun onDestroy() {
                super.onDestroy()
                // إيقاف ملقن الحركة وتنظيف الذاكرة بأمان تام لمنع أي تسريب خلفي للبيانات
                scrollRunnable?.let { scrollHandler.removeCallbacks(it) }
                
                floatingLayout?.let {
                    try {
                        windowManager?.removeView(it)
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                }
            }
        }
        EOF

        # 5. كود كوتلن (2): النشاط الرئيسي المستقر تماماً
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.content.Intent
        import android.graphics.Color
        import android.graphics.Typeface
        import android.media.MediaRecorder
        import android.net.Uri
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.provider.Settings
        import android.view.Gravity
        import android.widget.Button
        import android.widget.FrameLayout
        import android.widget.LinearLayout
        import android.widget.ScrollView
        import android.widget.TextView
        import androidx.core.content.FileProvider
        import java.io.File

        class MainActivity : Activity() {

            private var scrollerView: ScrollView? = null
            private val mainHandler = Handler(Looper.getMainLooper())
            private var scrollRunnable: Runnable? = null
            
            private var audioRecorder: MediaRecorder? = null
            private var audioFile: File? = null
            private var isRecording = false

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                val mainLayout = FrameLayout(this)
                mainLayout.setBackgroundColor(Color.BLACK)

                val mainScrollView = ScrollView(this)
                scrollerView = mainScrollView
                
                val prompterTextView = TextView(this)
                prompterTextView.text = "ميزة التسجيل الصوتي النقي وحفظ الملفات مباشرة على جهازك.\n\nالآن وأنت تقرأ هذا النص المنسق والمتحرك تلقائياً، يقوم محرك VoxPrompter الصوتي بالاستماع إليك وتسجيل نبرات صوتك بجودة ونقاء عاليين.\n\nفي الأسفل، قمنا بإضافة ميزة الاختصار الذكي؛ لتفعيل وضع الشاشة العائمة فوق التطبيقات الأخرى يدوياً وتسهيل القراءة أثناء تصفح هاتفك وحفظ تسجيلاتك بكل حرية."
                
                prompterTextView.setTextSize(28f)
                prompterTextView.setTextColor(Color.WHITE)
                prompterTextView.setGravity(Gravity.CENTER_HORIZONTAL)
                prompterTextView.setTypeface(Typeface.DEFAULT_BOLD)
                prompterTextView.setLineSpacing(0f, 1.5f)
                prompterTextView.setPadding(45, 100, 45, 1000)

                mainScrollView.addView(prompterTextView)
                mainLayout.addView(mainScrollView)

                val buttonContainer = LinearLayout(this)
                buttonContainer.orientation = LinearLayout.VERTICAL
                
                val containerParams = FrameLayout.LayoutParams(
                    FrameLayout.LayoutParams.MATCH_PARENT,
                    FrameLayout.LayoutParams.WRAP_CONTENT,
                    Gravity.BOTTOM
                )
                buttonContainer.layoutParams = containerParams

                val actionButton = Button(this)
                actionButton.text = "إيقاف ومشاركة الصوت 📤"
                actionButton.setBackgroundColor(Color.parseColor("#E53935"))
                actionButton.setTextColor(Color.WHITE)
                actionButton.setTypeface(Typeface.DEFAULT_BOLD)
                actionButton.setTextSize(18f)
                
                val btnParams1 = LinearLayout.LayoutParams(
                    LinearLayout.LayoutParams.MATCH_PARENT,
                    LinearLayout.LayoutParams.WRAP_CONTENT
                )
                btnParams1.setMargins(50, 10, 50, 10)
                actionButton.layoutParams = btnParams1
                actionButton.setOnClickListener { stopRecordingAndShare() }
                buttonContainer.addView(actionButton)

                val overlayButton = Button(this)
                overlayButton.text = "تفعيل الملقن العائم 📱"
                overlayButton.setBackgroundColor(Color.parseColor("#1E88E5"))
                overlayButton.setTextColor(Color.WHITE)
                overlayButton.setTypeface(Typeface.DEFAULT_BOLD)
                overlayButton.setTextSize(18f)
                
                val btnParams2 = LinearLayout.LayoutParams(
                    LinearLayout.LayoutParams.MATCH_PARENT,
                    LinearLayout.LayoutParams.WRAP_CONTENT
                )
                btnParams2.setMargins(50, 10, 50, 40)
                overlayButton.layoutParams = btnParams2
                
                overlayButton.setOnClickListener {
                    if (Settings.canDrawOverlays(this)) {
                        startService(Intent(this, FloatingService::class.java))
                    } else {
                        val intent = Intent(
                            Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                            Uri.parse("package:$packageName")
                        )
                        startActivity(intent)
                    }
                }
                buttonContainer.addView(overlayButton)

                mainLayout.addView(buttonContainer)
                setContentView(mainLayout)

                audioFile = File(externalCacheDir ?: cacheDir, "VoxPrompter_Record.amr")

                scrollRunnable = object : Runnable {
                    override fun run() {
                        scrollerView?.smoothScrollBy(0, 3)
                        scrollRunnable?.let { mainHandler.postDelayed(it, 40) }
                    }
                }
            }

            private fun stopRecordingAndShare() {
                scrollRunnable?.let { mainHandler.removeCallbacks(it) }
                if (isRecording) {
                    try {
                        audioRecorder?.stop()
                        audioRecorder?.release()
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                    audioRecorder = null
                    isRecording = false
                }

                audioFile?.let { file ->
                    if (file.exists()) {
                        try {
                            val fileUri: Uri = FileProvider.getUriForFile(
                                this,
                                "com.example.voxprompter.fileprovider",
                                file
                            )
                            val shareIntent = Intent(Intent.ACTION_SEND).apply {
                                type = "audio/amr"
                                putExtra(Intent.EXTRA_STREAM, fileUri)
                                addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)
                            }
                            startActivity(Intent.createChooser(shareIntent, "شارك تسجيلك الصوتي عبر:"))
                        } catch (e: Exception) {
                            e.printStackTrace()
                        }
                    }
                }
            }

            override fun onResume() {
                super.onResume()
                scrollRunnable?.let { mainHandler.postDelayed(it, 1000) }
                
                try {
                    audioRecorder = MediaRecorder().apply {
                        setAudioSource(MediaRecorder.AudioSource.MIC)
                        setOutputFormat(MediaRecorder.OutputFormat.AMR_NB)
                        setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB)
                        setOutputFile(audioFile?.absolutePath)
                        prepare()
                        start()
                    }
                    isRecording = true
                } catch (e: Exception) {
                    e.printStackTrace()
                }
            }

            override fun onPause() {
                super.onPause()
                scrollRunnable?.let { mainHandler.removeCallbacks(it) }
                if (isRecording) {
                    try {
                        audioRecorder?.stop()
                        audioRecorder?.release()
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                    audioRecorder = null
                    isRecording = false
                }
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
