name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # تطبيق بروتوكول التسمية الفريدة لضمان عزل المتغيرات المحلية تماماً عن الـ Activity
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست افتراضي نقي وثابت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كود كوتلن مع حماية كاملة للمتغيرات المحلية عبر التسمية الفريدة العازلة للـ Val
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.graphics.Color
        import android.graphics.Typeface
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.view.Gravity
        import android.view.ViewGroup
        import android.widget.LinearLayout
        import android.widget.ScrollView
        import android.widget.TextView

        class MainActivity : Activity() {

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                // عزل معاملات كائن الأبعاد تماماً
                val voxScreenParams = ViewGroup.LayoutParams(
                    ViewGroup.LayoutParams.MATCH_PARENT,
                    ViewGroup.LayoutParams.MATCH_PARENT
                )

                // 1. الحاوية الرئيسية بأسماء مخصصة فريدة
                val voxMainLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.BLACK)
                }

                // 2. حاوية التمرير محمية من أي تشابه مع دوال المترجم الأساسية
                val voxScrollView = ScrollView(this)

                // 3. عنصر النص البرامبتر الممتد المخصص
                val voxTextView = TextView(this)
                voxTextView.text = "مرحباً بك في VoxPrompter!\n\nهذا هو الحجر الثالث المكتمل والمخصص لاختبار محرك التمرير التلقائي المستقر.\n\nالآن، يجب أن تلاحظ أن النص يتحرك تلقائياً وبسلاسة نحو الأعلى دون أن تلمس الشاشة بإصبعك.\n\nهذا المحرك البرمجي يعتمد على عداد تكراري آمن مدمج في أندرويد لحساب الإزاحة العمودية بدقة.\n\nبمجرد التأكد من نجاح هذا البناء واستقرار الحركة التلقائية على جوالك، سننتقل في الخطوة القادمة لإضافة الحجر الرابع وهو أزرار التحكم والتشغيل."
                voxTextView.textSize = 28f
                voxTextView.setTextColor(Color.WHITE)
                voxTextView.gravity = Gravity.CENTER_HORIZONTAL
                voxTextView.typeface = Typeface.DEFAULT_BOLD
                voxTextView.lineSpacingMultiplier = 1.4f

                val voxTextParams = LinearLayout.LayoutParams(
                    LinearLayout.LayoutParams.MATCH_PARENT,
                    LinearLayout.LayoutParams.WRAP_CONTENT
                )
                voxTextParams.setMargins(40, 100, 40, 600)

                // 4. دمج وتشييد العناصر برمجياً بطريقة آمنة
                voxScrollView.addView(voxTextView, voxTextParams)
                voxMainLayout.addView(voxScrollView, voxScreenParams)
                
                setContentView(voxMainLayout, voxScreenParams)

                // 5. محرك تمرير تلقائي برمز مغلق فريد منعاً لخلط الثوابت في المترجم
                val voxHandler = Handler(Looper.getMainLooper())
                val voxRunnable = object : Runnable {
                    override fun run() {
                        voxScrollView.smoothScrollBy(0, 3)
                        voxHandler.postDelayed(this, 40)
                    }
                }
                
                // الإطلاق الآمن بعد ثانية كاملة
                voxHandler.postDelayed(voxRunnable, 1000)
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
