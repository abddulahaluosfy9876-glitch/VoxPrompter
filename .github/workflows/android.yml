name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Inject Gradle Properties
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # خطوة هندسية حاسمة: إعادة بناء المسار المادي الفعلي للكود لضمان التطابق
    - name: Force Rebuild Clean Source Directory
      run: |
        rm -rf app/src/main/java
        mkdir -p app/src/main/java/com/example/voxprompter
        
        # كتابة ملف MainActivity النظيف والمستقر مباشرة في المسار الصحيح
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.os.Bundle
        import android.view.Gravity
        import android.widget.FrameLayout
        import android.widget.TextView
        import androidx.appcompat.app.AppCompatActivity

        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                val rootLayout = FrameLayout(this).apply {
                    setBackgroundColor(0xFFFFFFFF.toInt())
                }
                
                val textView = TextView(this).apply {
                    text = "Welcome to VoxPrompter!\nApplication Started Successfully."
                    textSize = 24f
                    setTextColor(0xFF000000.toInt())
                    gravity = Gravity.CENTER
                }
                
                rootLayout.addView(textView, FrameLayout.LayoutParams(
                    FrameLayout.LayoutParams.MATCH_PARENT,
                    FrameLayout.LayoutParams.MATCH_PARENT
                ))
                
                setContentView(rootLayout)
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
