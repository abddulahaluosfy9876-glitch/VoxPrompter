name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  independent_verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK Environment
      uses: android-actions/setup-android@v3

    # خطوة التفكير العميق: تأمين وإرشاد الـ Gradle لمستودعات أندرويد الرسمية لتخطي انهيار السطر الأول
    - name: Inject Android Repositories to Settings
      run: |
        cat << 'EOF' > patch_settings.txt
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        cat patch_settings.txt settings.gradle.kts > temp_settings && mv temp_settings settings.gradle.kts

    # الآن نولد الـ Wrapper داخل بيئة أصبحت تفهم الأندرويد ومستودعاته تماماً
    - name: Setup Official Gradle Action
      uses: gradle/actions/setup-gradle@v3

    - name: Generate and Verify Wrapper Health
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew --version --no-daemon
        
