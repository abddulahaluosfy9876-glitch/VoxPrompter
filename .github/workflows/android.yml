name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # حقن الحجر الرابع: إضافة ميزة جودة القراءة وظهور النص بوضوح عالي
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست افتراضي نقي وثابت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كود كوتلن: حاوية التمرير وبداخلها النص المنسق والمجهز تماماً للقراءة المريحة
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.graphics.Color
        import android.graphics.Typeface
        import android.os.Bundle
        import android.view.Gravity
        import android.widget.ScrollView
        import android.widget.TextView

        class MainActivity : Activity() {

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                // 1. إنشاء حاوية التمرير الخلفية باللون الأسود
                val mainScrollView = ScrollView(this)
                mainScrollView.setBackgroundColor(Color.BLACK)
                
                // 2. إنشاء وتنسيق عنصر النص لضمان أعلى جودة ظهور وسهولة قراءة
                val prompterTextView = TextView(this)
                prompterTextView.text = "مرحباً بك في VoxPrompter!\n\nهذا هو النص الذكي المنسق بجودة عالية لتسهيل القراءة.\n\nتم ضبط حجم الخط ليكون كبيراً وواضحاً، وتم توسيع الفراغات بين الأسطر لراحة العين أثناء الإلقاء والتسجيل الصوتي.\n\nفي الخطوات القادمة، سنضيف ميزة التسجيل الصوتي النقي وحفظ الملفات مباشرة على جهازك."
                
                prompterTextView.textSize = 28f // حجم خط كبير ومثالي للملقن
                prompterTextView.setTextColor(Color.WHITE) // تباين عالي (أبيض على أسود)
                prompterTextView.gravity = Gravity.CENTER_HORIZONTAL // محاذاة النص في المنتصف
                prompterTextView.typeface = Typeface.DEFAULT_BOLD // خط عريض وواضح
                prompterTextView.lineSpacingMultiplier = 1.5f // مسافة أسطر مريحة جداً تمنع تداخل الكلمات
                
                // إضافة حشو داخلي (Padding) لمنع التصاق النص بحواف الشاشة ولإعطاء مساحة فارغة في الأسفل
                prompterTextView.setPadding(45, 100, 45, 600)

                // 3. دمج النص داخل حاوية التمرير
                mainScrollView.addView(prompterTextView)
                
                // 4. تعيين الواجهة بالكامل على الشاشة
                setContentView(mainScrollView)
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
