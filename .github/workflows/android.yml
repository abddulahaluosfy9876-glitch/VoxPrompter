name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Inject Step 4 - Smart Voice-Activated Scroll Only
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml

        # 1. المانيفست والأذونات ومشاركة الملفات
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
            
            <application
                android:allowBackup="true"
                android:label="VoxPrompter Smart Scroll"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <provider
                    android:name="androidx.core.content.FileProvider"
                    android:authorities="com.example.voxprompter.fileprovider"
                    android:exported="false"
                    android:grantUriPermissions="true">
                    <meta-data
                        android:name="android.support.FILE_PROVIDER_PATHS"
                        android:resource="@xml/file_paths" />
                </provider>
            </application>
        </manifest>
        EOF

        # 2. ملف مسارات مشاركة الملفات الصوتية
        cat << 'EOF' > app/src/main/res/xml/file_paths.xml
        <?xml version="1.0" encoding="utf-8"?>
        <paths>
            <external-cache-path name="external_cache" path="." />
            <cache-path name="internal_cache" path="." />
        </paths>
        EOF

        # 3. ملف النصوص العامة
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 4. الكود الرئيسي: دمج تحليل شدة الصوت مع حركة التمرير
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.graphics.Color
        import android.media.MediaRecorder
        import android.os.Build
        import android.os.Bundle
        import android.os.Handler
        
