name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # إعداد وتثبيت Gradle بشكل مستقل على السيرفر لتجاوز غياب الـ Wrapper
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    # البناء باستخدام أمر gradle المثبت مباشرة على السيرفر (بدون ./gradlew) لتفادي خطأ 127
    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace
      
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Preview-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
