name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check_base_project:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission
      run: chmod +x gradlew

    - name: Run Basic Gradle Check
      run: ./gradlew tasks --no-daemon
      
