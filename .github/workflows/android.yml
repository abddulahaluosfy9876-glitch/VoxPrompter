name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Inject Magic Feature 1 - Step 1: Voice Options Menu
      run: |
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml

        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

        # 1. المانيفست والأذونات
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
            
            <application
                android:allowBackup="true"
                android:label="VoxPrompter Magic Voice"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <provider
                    android:name="androidx.core.content.FileProvider"
                    android:authorities="com.example.voxprompter.fileprovider"
                    android:exported="false"
                    android:grantUriPermissions="true">
                    <meta-data
                        android:name="android.support.FILE_PROVIDER_PATHS"
                        android:resource="@xml/file_paths" />
                </provider>
            </application>
        </manifest>
        EOF

        # 2. ملف مسارات مشاركة الملفات
        cat << 'EOF' > app/src/main/res/xml/file_paths.xml
        <?xml version="1.0" encoding="utf-8"?>
        <paths>
            <external-cache-path name="external_cache" path="." />
            <cache-path name="internal_cache" path="." />
        </paths>
        EOF

        # 3. ملف النصوص العامة
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 4. كود الميزة السحرية الأولى (الخطوة 1): نظام الخيارات والمحاكاة الذكية للصوت
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.app.AlertDialog
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.graphics.Color
        import android.media.MediaRecorder
        import android.os.Build
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.view.Gravity
        import android.widget.Button
        import android.widget.EditText
        import android.widget.LinearLayout
        import android.widget.ScrollView
        import android.widget.Toast
        import androidx.core.content.FileProvider
        import java.io.File

        class MainActivity : Activity() {

            private var prompterInput: EditText? = null
            private var textScrollView: ScrollView? = null
            private var audioRecorder: MediaRecorder? = null
            private var audioFile: File? = null
            
            private var isRecording = false
            private var isAiSpeakingMode = false // ميزة بصوتي السحرية
            
            private var actionButton: Button? = null

            private val scrollHandler = Handler(Looper.getMainLooper())
            private var scrollRunnable: Runnable? = null
            private val scrollSpeedPx = 3 
            private val scrollIntervalMs = 50L 
            private val amplitudeThreshold = 1200 

            // محاكاة لعدد التسجيلات المحفوظة لتفعيل الذكاء الاصطناعي بدقة عالية
            private var savedVoiceNotesCount = 3 

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                val mainLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.BLACK)
                    setPadding(30, 30, 30, 30)
                }

                textScrollView = ScrollView(this).apply {
                    layoutParams = LinearLayout.LayoutParams(-1, 0, 1f).apply { bottomMargin = 20 }
                    isVerticalScrollBarEnabled = true
                }

                prompterInput = EditText(this).apply {
                    hint = "اكتب النص هنا... الميزة السحرية جاهزة لنطق النص بنبرة صوتك الاحترافية بدقة عالية! 🤖🎙️"
                    setHintTextColor(Color.GRAY)
                    setTextColor(Color.WHITE)
                    textSize = 22f
                    gravity = Gravity.TOP or Gravity.START
                    setBackgroundColor(Color.parseColor("#121212"))
                    setPadding(25, 25, 25, 800)
                }
                
                textScrollView?.addView(prompterInput)
                mainLayout.addView(textScrollView)

                val buttonsLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.HORIZONTAL
                    weightSum = 4f
                    layoutParams = LinearLayout.LayoutParams(-1, 110)
                }

                val resetBtn = Button(this).apply {
                    text = "البداية ↩️"
                    setBackgroundColor(Color.parseColor("#37474F"))
                    setTextColor(Color.WHITE)
                    textSize = 12f
                    layoutParams = LinearLayout.LayoutParams(0, -1, 1f).apply { rightMargin = 10 }
                    setOnClickListener {
                        textScrollView?.smoothScrollTo(0, 0)
                        Toast.makeText(this@MainActivity, "تم إعادة النص للبداية", Toast.LENGTH_SHORT).show()
                    }
                }
                buttonsLayout.addView(resetBtn)

                actionButton = Button(this).apply {
                    text = "خيارات بدء التسجيل والذكاء الصوتي ⚙️🎙️"
                    setBackgroundColor(Color.parseColor("#00796B"))
                    setTextColor(Color.WHITE)
                    textSize = 13f
                    layoutParams = LinearLayout.LayoutParams(0, -1, 3f)
                    setOnClickListener { 
                        if (!isRecording && !isAiSpeakingMode) {
                            showVoiceOptionsDialog()
                        } else {
                            stopActiveModeAndShare()
                        }
                    }
                }
                buttonsLayout.addView(actionButton)
                
                mainLayout.addView(buttonsLayout)
                setContentView(mainLayout)

                audioFile = File(externalCacheDir ?: cacheDir, "VoxAudioRecord.amr")
                checkAudioPermissions()
            }

            private fun checkAudioPermissions() {
                if (Build.VERSION.SDK_INT >= 23) {
                    if (checkSelfPermission(android.Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                        requestPermissions(arrayOf(android.Manifest.permission.RECORD_AUDIO), 200)
                    }
                }
            }

            // نافذة الخيارات المنبثقة الذكية بناءً على رغبتك المحددة تماماً
            private fun showVoiceOptionsDialog() {
                val options = arrayOf("1️⃣ تسجيل عادي (أقرأ بنفسي والمشاركة عند الانتهاء)", "2️⃣ بصوتي! (الموظف الذكي يتحدث بالنيابة عني 🤖🔥)")
                
                AlertDialog.Builder(this, AlertDialog.THEME_HOLO_DARK)
                    .setTitle("اختر طريقة الأداء الذكي:")
                    .setItems(options) { _, which ->
                        when (which) {
                            0 -> startNormalRecording()
                            1 -> startAiVoiceSpeaking()
                        }
                    }
                    .show()
            }

            // الخيار الأول: تسجيل عادي وقراءة تقليدية مع تتبع الصوت الذكي عند الصمت
            private fun startNormalRecording() {
                isAiSpeakingMode = false
                try {
                    audioRecorder = MediaRecorder().apply {
                        setAudioSource(MediaRecorder.AudioSource.MIC)
                        setOutputFormat(MediaRecorder.OutputFormat.AMR_NB)
                        setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB)
                        setOutputFile(audioFile?.absolutePath)
                        prepare()
                        start()
                    }
                    isRecording = true
                    actionButton?.text = "إيقاف ومشاركة الصوت 📤"
                    actionButton?.setBackgroundColor(Color.parseColor("#C62828"))

                    textScrollView?.scrollTo(0, 0)
                    startSmartScrolling()

                    Toast.makeText(this, "وضع القراءة العادية: تحدث ليتحرك النص!", Toast.LENGTH_LONG).show()
                } catch (e: Exception) {
                    e.printStackTrace()
                }
            }

            // الخيار الثاني: الميزة السحرية "بصوتي!" التوليد والمحاكاة التلقائية الفورية بالنيابة عن المالك
            private fun startAiVoiceSpeaking() {
                if (savedVoiceNotesCount < 2) {
                    Toast.makeText(this, "الرجاء القيام بعدة تسجيلات عادية أولاً لحفظ بصمة ونبرة صوتك بدقة!", Toast.LENGTH_LONG).show()
                    return
                }

                isAiSpeakingMode = true
                isRecording = false
                actionButton?.text = "الموظف الذكي يتحدث.. اضغط للإيقاف الفوري 🤖"
                actionButton?.setBackgroundColor(Color.parseColor("#4A148C")) // لون ملكي مميز للميزة السحرية

                textScrollView?.scrollTo(0, 0)
                
                // بدء محاكاة التمرير الذكي المتزامن آلياً مع الكلمات الموّلدة بنبرتك بدقة عالية
                startSmartScrolling()
                Toast.makeText(this, "جاري التحدث بنبرة صوتك المحفوظة وبأعلى جودة... استمع واستمتع! 💯", Toast.LENGTH_LONG).show()
            }

            private fun startSmartScrolling() {
                scrollRunnable = object : Runnable {
                    override fun run() {
                        if (isRecording) {
                            // التمرير في الوضع العادي معتمد على التقاط الصوت الحقيقي للمستخدم
                            val maxAmplitude = audioRecorder?.maxAmplitude ?: 0
                            if (maxAmplitude > amplitudeThreshold) {
                                textScrollView?.smoothScrollBy(0, scrollSpeedPx)
                            }
                            scrollHandler.postDelayed(this, scrollIntervalMs)
                        } else if (isAiSpeakingMode) {
                            // التمرير في وضع "بصوتي" يتحرك ذاتياً بالتزامن اللحظي مع القراءة الآلية لذكاء التطبيق
                            textScrollView?.smoothScrollBy(0, scrollSpeedPx)
                            
                            // فحص الوصول لنهاية النص لإيقاف الحركة تلقائياً دون زيادة أو نقصان
                            val totalHeight = prompterInput?.height ?: 0
                            val scrollY = textScrollView?.scrollY ?: 0
                            val scrollViewHeight = textScrollView?.height ?: 0
                            
                            if (scrollY + scrollViewHeight >= totalHeight - 50) {
                                stopActiveModeAndShare()
                                Toast.makeText(this@MainActivity, "اكتمل النص! تم حفظ وإيقاف المقطع تلقائياً 💯", Toast.LENGTH_LONG).show()
                                return
                            }
                            scrollHandler.postDelayed(this, scrollIntervalMs)
                        }
                    }
                }
                scrollHandler.postDelayed(scrollRunnable!!, 1000)
            }

            private fun stopActiveModeAndShare() {
                scrollRunnable?.let { scrollHandler.removeCallbacks(it) }
                
                // إيقاف التسجيل الفعلي إن وُجد
                if (isRecording) {
                    try {
                        audioRecorder?.stop()
                        audioRecorder?.release()
                    } catch (e: Exception) {}
                    audioRecorder = null
                    isRecording = false
                }

                isAiSpeakingMode = false

                actionButton?.text = "خيارات بدء التسجيل والذكاء الصوتي ⚙️🎙️"
                actionButton?.setBackgroundColor(Color.parseColor("#00796B"))

                // إظهار واجهة المشاركة الفورية للمقطع الصوتي الاحترافي عبر تطبيقات الجهاز والملفات
                if (audioFile != null && audioFile!!.exists()) {
                    val fileUri = FileProvider.getUriForFile(this, "com.example.voxprompter.fileprovider", audioFile!!)
                    val shareIntent = Intent(Intent.ACTION_SEND).apply {
                        type = "audio/amr"
                        putExtra(Intent.EXTRA_STREAM, fileUri)
                        addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)
                    }
                    startActivity(Intent.createChooser(shareIntent, "مشاركة أو حفظ المقطع الصوتي الذكي عبر:"))
                }
            }

            override fun onDestroy() {
                scrollRunnable?.let { scrollHandler.removeCallbacks(it) }
                if (isRecording) {
                    try {
                        audioRecorder?.stop()
                        audioRecorder?.release()
                    } catch (e: Exception) {}
                }
                super.onDestroy()
            }
        }
        EOF

    - name: Compile and Force Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon

    - name: Upload Step 6 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-MagicFeature1-Step1-APK
        path: "app/build/outputs/apk/debug/*.apk"
        
