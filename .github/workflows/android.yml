name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # تنظيف جذري شامل وحقن الهيكل القياسي الأبسط في تاريخ أندرويد
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست افتراضي نقي وثابت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كود كوتلن الصافي والمحمي 100% (بدون تخطيطات معقدة وبدون أي مراجع مشتركة)
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.graphics.Color
        import android.graphics.Typeface
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.view.Gravity
        import android.widget.ScrollView
        import android.widget.TextView

        class MainActivity : Activity() {

            private var scrollerView: ScrollView? = null
            private val mainHandler = Handler(Looper.getMainLooper())
            
            // عداد الحركة التكراري المعزول كلياً
            private val scrollTicker = object : Runnable {
                override fun run() {
                    scrollerView?.smoothScrollBy(0, 3)
                    mainHandler.postDelayed(this, 40)
                }
            }

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                // إنشاء حاوية التمرير مباشرة كواجهة رئيسية للنشاط
                val scrollView = ScrollView(this)
                scrollView.setBackgroundColor(Color.BLACK)
                scrollerView = scrollView

                // إنشاء وإعداد خطبة وجسم النص
                val textView = TextView(this)
                textView.text = "مرحباً بك في VoxPrompter!\n\nهذا هو الحجر الثالث المكتمل والمخصص لاختبار محرك التمرير التلقائي المستقر.\n\nالآن، يجب أن تلاحظ أن النص يتحرك تلقائياً وبسلاسة نحو الأعلى دون أن تلمس الشاشة بإصبعك.\n\nهذا المحرك البرمجي يعتمد على عداد تكراري آمن مدمج في أندرويد لحساب الإزاحة العمودية بدقة.\n\nبمجرد التأكد من نجاح هذا البناء واستقرار الحركة التلقائية على جوالك، سننتقل في الخطوة القادمة لإضافة الحجر الرابع وهو أزرار التحكم والتشغيل."
                textView.textSize = 28f
                textView.setTextColor(Color.WHITE)
                textView.gravity = Gravity.CENTER_HORIZONTAL
                textView.typeface = Typeface.DEFAULT_BOLD
                textView.lineSpacingMultiplier = 1.4f
                
                // استخدام الـ Padding الآمن بدلاً من الـ Margins لضمان المساحة التمريرية السفلى وعزل الكود
                textView.setPadding(40, 100, 40, 800)

                // دمج النص داخل حاوية التمرير مباشرة دون أي وسائط أخرى
                scrollView.addView(textView)
                
                // تعيين الواجهة النقية
                setContentView(scrollView)
            }

            override fun onResume() {
                super.onResume()
                mainHandler.postDelayed(scrollTicker, 1000)
            }

            override fun onPause() {
                super.onPause()
                mainHandler.removeCallbacks(scrollTicker)
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
