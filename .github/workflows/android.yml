name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # حقن الإصلاح الشامل: واجهة تفاعلية كاملة مع تمرير البيانات الآمن للخدمة العائمة
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. المانيفست الرسمي للتطبيق
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <service
                    android:name="com.example.voxprompter.FloatingService"
                    android:enabled="true"
                    android:exported="false" />
                
                <provider
                    android:name="androidx.core.content.FileProvider"
                    android:authorities="com.example.voxprompter.fileprovider"
                    android:exported="false"
                    android:grantUriPermissions="true">
                    <meta-data
                        android:name="android.support.FILE_PROVIDER_PATHS"
                        android:resource="@xml/file_paths" />
                </provider>
            </application>
        </manifest>
        EOF

        # 2. ملف مسارات الحماية ومشاركة الملفات
        mkdir -p app/src/main/res/xml
        cat << 'EOF' > app/src/main/res/xml/file_paths.xml
        <?xml version="1.0" encoding="utf-8"?>
        <paths>
            <external-cache-path name="external_cache" path="." />
            <cache-path name="internal_cache" path="." />
        </paths>
        EOF

        # 3. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 4. كود كوتلن (1): الخدمة العائمة المتزامنة مع الميكروفون واستقبال النصوص الديناميكية
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/FloatingService.kt
