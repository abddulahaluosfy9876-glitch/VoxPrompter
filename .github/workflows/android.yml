name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  stable_automated_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK Environment
      uses: android-actions/setup-android@v3

    # الواجب الفعلي: توفير بيئة مستودعات آمنة للمحرك خارج ملفات مشروعك الأساسية
    - name: Setup Init Repositories Settings
      run: |
        mkdir -p ~/.gradle
        cat << 'EOF' > ~/.gradle/init.gradle
        allprojects {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        settingsEvaluated { settings ->
            settings.pluginManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
        }
        EOF

    - name: Setup Official Gradle Action
      uses: gradle/actions/setup-gradle@v3

    # بناء الـ Wrapper بأمان وسلام من داخل البيئة المحصنة
    - name: Generate Project Wrapper
      run: gradle wrapper

    - name: Verify Wrapper Status
      run: |
        chmod +x gradlew
        ./gradlew --version --no-daemon
        
