name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Inject Step 1 - Floating Overlay Permission Only
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. المانيفست: يطلب إذن الظهور فوق التطبيقات فقط
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <service
                    android:name="com.example.voxprompter.FloatingService"
                    android:enabled="true"
                    android:exported="false" />
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. الخدمة العائمة: مسؤولة فقط عن إنشاء النافذة فوق التطبيقات الأخرى
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/FloatingService.kt
        package com.example.voxprompter

        import android.app.Service
        import android.content.Context
        import android.content.Intent
        import android.graphics.Color
        import android.graphics.PixelFormat
        import android.os.Build
        import android.os.IBinder
        import android.view.Gravity
        import android.view.WindowManager
        import android.widget.Button
        import android.widget.LinearLayout
        import android.widget.TextView

        class FloatingService : Service() {
            private var windowManager: WindowManager? = null
            private var floatingLayout: LinearLayout? = null

            override fun onBind(intent: Intent?): IBinder? = null

            override fun onCreate() {
                super.onCreate()
                windowManager = getSystemService(Context.WINDOW_SERVICE) as WindowManager

                floatingLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.parseColor("#CC000000"))
                    setPadding(20, 20, 20, 20)
                }

                val textView = TextView(this).apply {
                    text = "الملقن العائم يعمل الآن فوق التطبيقات والواتساب بنجاح! ✅"
                    setTextColor(Color.WHITE)
                    textSize = 16f
                }
                floatingLayout?.addView(textView)

                val closeButton = Button(this).apply {
                    text = "إغلاق ✖"
                    setOnClickListener { stopSelf() }
                }
                floatingLayout?.addView(closeButton)

                // إعدادات النافذة لتظهر فوق كل شيء (بما فيها الواتساب) طبقاً للأنظمة الحديثة
                val params = WindowManager.LayoutParams(
                    WindowManager.LayoutParams.MATCH_PARENT,
                    WindowManager.LayoutParams.WRAP_CONTENT,
                    if (Build.VERSION.SDK_INT >= 26) WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY else WindowManager.LayoutParams.TYPE_PHONE,
                    WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                    PixelFormat.TRANSLUCENT
                ).apply {
                    gravity = Gravity.TOP or Gravity.START
                    y = 150
                }

                windowManager?.addView(floatingLayout, params)
            }

            override fun onDestroy() {
                floatingLayout?.let {
                    try { windowManager?.removeView(it) } catch (e: Exception) {}
                }
                super.onDestroy()
            }
        }
        EOF

        # 4. الواجهة الرئيسية: زر واحد فقط لطلب الإذن وتشغيل الملقن العائم
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.content.Intent
        import android.graphics.Color
        import android.net.Uri
        import android.os.Bundle
        import android.provider.Settings
        import android.widget.Button
        import android.widget.LinearLayout

        class MainActivity : Activity() {

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                val mainLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setBackgroundColor(Color.BLACK)
                    setPadding(50, 50, 50, 50)
                }

                val startButton = Button(this).apply {
                    text = "تفعيل الملقن العائم فوق التطبيقات 📱"
                    setBackgroundColor(Color.parseColor("#1565C0"))
                    setTextColor(Color.WHITE)
                    setOnClickListener {
                        if (Settings.canDrawOverlays(this@MainActivity)) {
                            startService(Intent(this@MainActivity, FloatingService::class.java))
                        } else {
                            val intent = Intent(
                                Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                Uri.parse("package:$packageName")
                            )
                            startActivity(intent)
                        }
                    }
                }
                mainLayout.addView(startButton)

                setContentView(mainLayout)
            }
        }
        EOF

    - name: Compile and Force Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon

    - name: Upload Step 1 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Step1-APK
        path: "app/build/outputs/apk/debug/*.apk"
        
