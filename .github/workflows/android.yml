name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # تطبيق بروتوكول الفصل التام للملفات البرمجية لمنع تعارض مراجع المترجم
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست افتراضي نقي وثابت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كلاس الواجهة والمحرك التكراري معزول بالكامل في ملف منفصل ومحمي 100%
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/PrompterLayout.kt
        package com.example.voxprompter

        import android.content.Context
        import android.graphics.Color
        import android.graphics.Typeface
        import android.os.Handler
        import android.os.Looper
        import android.view.Gravity
        import android.view.ViewGroup
        import android.widget.LinearLayout
        import android.widget.ScrollView
        import android.widget.TextView

        class PrompterLayout(context: Context) : LinearLayout(context) {
            
            private val scrollerComponent: ScrollView = ScrollView(context)
            private val animationHandler = Handler(Looper.getMainLooper())
            
            private val tickerRunnable = object : Runnable {
                override fun run() {
                    scrollerComponent.smoothScrollBy(0, 3)
                    animationHandler.postDelayed(this, 40)
                }
            }

            init {
                this.orientation = VERTICAL
                this.setBackgroundColor(Color.BLACK)

                val contentTextView = TextView(context)
                contentTextView.text = "مرحباً بك في VoxPrompter!\n\nهذا هو الحجر الثالث المكتمل والمخصص لاختبار محرك التمرير التلقائي المستقر.\n\nالآن، يجب أن تلاحظ أن النص يتحرك تلقائياً وبسلاسة نحو الأعلى دون أن تلمس الشاشة بإصبعك.\n\nهذا المحرك البرمجي يعتمد على عداد تكراري آمن مدمج في أندرويد لحساب الإزاحة العمودية بدقة.\n\nبمجرد التأكد من نجاح هذا البناء واستقرار الحركة التلقائية على جوالك، سننتقل في الخطوة القادمة لإضافة الحجر الرابع وهو أزرار التحكم والتشغيل."
                contentTextView.textSize = 28f
                contentTextView.setTextColor(Color.WHITE)
                contentTextView.gravity = Gravity.CENTER_HORIZONTAL
                contentTextView.typeface = Typeface.DEFAULT_BOLD
                contentTextView.lineSpacingMultiplier = 1.4f

                val textLayoutParams = LayoutParams(
                    LayoutParams.MATCH_PARENT,
                    LayoutParams.WRAP_CONTENT
                )
                textLayoutParams.setMargins(40, 100, 40, 600)

                scrollerComponent.addView(contentTextView, textLayoutParams)
                
                val scrollerLayoutParams = LayoutParams(
                    LayoutParams.MATCH_PARENT,
                    LayoutParams.MATCH_PARENT
                )
                this.addView(scrollerComponent, scrollerLayoutParams)
            }

            fun startMoving() {
                animationHandler.postDelayed(tickerRunnable, 1000)
            }

            fun stopMoving() {
                animationHandler.removeCallbacks(tickerRunnable)
            }
        }
        EOF

        # 4. كلاس الـ Activity الرئيسي النقي لاستدعاء الحاوية المستقلة دون تعارض
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.os.Bundle
        import android.view.ViewGroup

        class MainActivity : Activity() {
            
            private var mainLayout: PrompterLayout? = null

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                val prompterContainer = PrompterLayout(this)
                mainLayout = prompterContainer
                
                val layoutParamsConfig = ViewGroup.LayoutParams(
                    ViewGroup.LayoutParams.MATCH_PARENT,
                    ViewGroup.LayoutParams.MATCH_PARENT
                )
                
                setContentView(prompterContainer, layoutParamsConfig)
            }

            override fun onResume() {
                super.onResume()
                mainLayout?.startMoving()
            }

            override fun onPause() {
                super.onPause()
                mainLayout?.stopMoving()
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
