name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  focused_wrapper_generation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK Environment
      uses: android-actions/setup-android@v3

    - name: Setup Official Gradle Action
      uses: gradle/actions/setup-gradle@v3

    # الخطوة الصحيحة: توليد الـ Wrapper مع أمر صريح بالتخطي وعدم التفتيش في ملفات المشروع الآن
    - name: Generate Fresh Project Wrapper
      run: gradle wrapper --no-configure

    # التحقق الهادئ من صحة واستقرار الملف المتولد
    - name: Verify Wrapper Operational Health
      run: |
        chmod +x gradlew
        ./gradlew --version --no-daemon
        
