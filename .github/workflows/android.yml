name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # تطبيق مقترح المهندس: مهمة واحدة بسيطة جداً (إنشاء الحاوية الصافية) لضمان استقرار المترجم
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست افتراضي نقي وثابت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كود كوتلن فائق التبسيط: شاشة سوداء وحاوية تمرير فقط لا غير
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.graphics.Color
        import android.os.Bundle
        import android.widget.ScrollView

        class MainActivity : Activity() {

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                // مهمة واحدة: إنشاء حاوية التمرير باللون الأسود وتعيينها واجهة للتطبيق
                val mainScrollView = ScrollView(this)
                mainScrollView.setBackgroundColor(Color.BLACK)
                
                setContentView(mainScrollView)
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
