name: VoxPrompter - Purge Old Code

on:
  push:
    branches: [ "main" ]

jobs:
  purge_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Force Clean Old Architecture
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # حذف مجلد البنية القديمة بالكامل لمنع تعارض المراجع
        rm -rf app/src/main/java/com/smart
        
        git add .
        git commit -m "Bot: Purge old smart package and source files" || echo "No files to remove"
        git push origin main
        
