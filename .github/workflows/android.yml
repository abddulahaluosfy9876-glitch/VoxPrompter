name: VoxPrompter Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Official Action
      uses: gradle/actions/setup-gradle@v3

    # الخطوة التصاعدية الجديدة: بناء نسخة التطبيق والتأكد من سلامة ملفات الصوت والأكواد
    - name: Assemble Debug APK
      run: gradle assembleDebug --no-daemon

      
