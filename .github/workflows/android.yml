name: VoxPrompter Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Force Enable AndroidX Everywhere
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        mkdir -p app
        echo "android.useAndroidX=true" > app/gradle.properties
        echo "android.enableJetifier=true" >> app/gradle.properties

    - name: Change Permission for Gradlew
      run: chmod +x gradlew

    - name: Clean and Build Studio APK
      run: ./gradlew clean assembleDebug --no-daemon

    - name: Upload VoxPrompter APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-MagicVoice-V2
        path: app/build/outputs/apk/debug/app-debug.apk
        
