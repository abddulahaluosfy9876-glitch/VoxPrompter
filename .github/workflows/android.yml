name: Android CI-CD Autopilot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_wrapper_first:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Fresh Valid Wrapper
      # هذه هي الخطوة المفقودة! نطلب توليد ملفات التشغيل بشكل نقي أولاً
      run: gradle wrapper

    - name: Verify Fresh Wrapper Exists
      # التحقق من أن الملف أصبح موجوداً وصالحاً قبل المضي قدماً
      run: |
        ls -la gradlew
        ./gradlew --version --no-daemon
        
