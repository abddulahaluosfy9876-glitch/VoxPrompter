name: VoxPrompter Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    # حقن الحجر السادس: إضافة محرك تسجيل صوتي عالي الجودة وحفظه تلقائياً
    - name: Clean Minimal Injection
      run: |
        find . -name "Main.kt" -type f -delete
        find . -name "PrompterLayout.kt" -type f -delete
        rm -rf app/src
        mkdir -p app/src/main/java/com/example/voxprompter
        mkdir -p app/src/main/res/values

        # 1. مانيفست نقي وثابت مع إضافة صلاحية المايكروفون الأساسية للتسجيل
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.voxprompter">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            
            <application
                android:allowBackup="true"
                android:label="VoxPrompter"
                android:theme="@android:style/Theme.Black.NoTitleBar">
                <activity
                    android:name="com.example.voxprompter.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 2. ملف الموارد الأساسي
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">VoxPrompter</string>
        </resources>
        EOF

        # 3. كود كوتلن: دمج محرك التسجيل وحفظ الملفات بشكل آمن ودون اصطدامات
        cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
        package com.example.voxprompter

        import android.app.Activity
        import android.graphics.Color
        import android.graphics.Typeface
        import android.media.MediaRecorder
        import android.os.Bundle
        import android.os.Handler
        import android.os.Looper
        import android.view.Gravity
        import android.widget.ScrollView
        import android.widget.TextView
        import java.io.File

        class MainActivity : Activity() {

            private var scrollerView: ScrollView? = null
            private val mainHandler = Handler(Looper.getMainLooper())
            private var scrollRunnable: Runnable? = null
            
            // تعريف كائنات محرك الصوت والملفات بأسلوب مرن ومستقل
            private var audioRecorder: MediaRecorder? = null
            private var audioFile: File? = null

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)

                val mainScrollView = ScrollView(this)
                mainScrollView.setBackgroundColor(Color.BLACK)
                scrollerView = mainScrollView
                
                val prompterTextView = TextView(this)
                prompterTextView.text = "ميزة التسجيل الصوتي النقي وحفظ الملفات مباشرة على جهازك.\n\nالآن وأنت تقرأ هذا النص المنسق والمتحرك تلقائياً، يقوم محرك VoxPrompter الصوتي بالاستماع إليك وتسجيل نبرات صوتك بجودة ونقاء عاليين.\n\nبمجرد خروجك أو إيقاف التطبيق، سيتم حفظ المقطع الصوتي المسجل فوراً داخل ذاكرة جهازك الآمنة لتتمكن من مشاركته لاحقاً بكل سهولة وحرية وبأعلى جودة ممكنة."
                
                prompterTextView.setTextSize(28f)
                prompterTextView.setTextColor(Color.WHITE)
                prompterTextView.setGravity(Gravity.CENTER_HORIZONTAL)
                prompterTextView.setTypeface(Typeface.DEFAULT_BOLD)
                prompterTextView.setLineSpacing(0f, 1.5f)
                prompterTextView.setPadding(45, 100, 45, 800)

                mainScrollView.addView(prompterTextView)
                setContentView(mainScrollView)

                // تجهيز ملف الحفظ الصوتي النقي في مساحة التخزين الداخلية للجهاز
                audioFile = File(externalCacheDir ?: cacheDir, "VoxPrompter_Record.amr")

                scrollRunnable = object : Runnable {
                    override fun run() {
                        scrollerView?.smoothScrollBy(0, 3)
                        scrollRunnable?.let { mainHandler.postDelayed(it, 40) }
                    }
                }
            }

            override fun onResume() {
                super.onResume()
                // 1. بدء التمرير التلقائي بعد ثانية واحدة
                scrollRunnable?.let { mainHandler.postDelayed(it, 1000) }
                
                // 2. تشغيل محرك التسجيل الصوتي عالي الجودة بالتزامن التام
                try {
                    audioRecorder = MediaRecorder().apply {
                        setAudioSource(MediaRecorder.AudioSource.MIC)
                        setOutputFormat(MediaRecorder.OutputFormat.AMR_NB)
                        setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB)
                        setOutputFile(audioFile?.absolutePath)
                        prepare()
                        start()
                    }
                } catch (e: Exception) {
                    e.printStackTrace()
                }
            }

            override fun onPause() {
                super.onPause()
                scrollRunnable?.let { mainHandler.removeCallbacks(it) }
                
                // إيقاف التسجيل بأمان تام وحفظ الملف الصوتي فوراً عند الخروج لحفظ جهد المستخدم
                try {
                    audioRecorder?.apply {
                        stop()
                        release()
                    }
                } catch (e: Exception) {
                    e.printStackTrace()
                }
                audioRecorder = null
            }
        }
        EOF

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VoxPrompter-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
