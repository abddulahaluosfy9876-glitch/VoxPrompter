name: Add Voice Follower to MainActivity

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm adding Voice Follower'
        required: true
        default: 'NO'

permissions:
  contents: write

jobs:
  update-code:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Write Updated MainActivity with Voice Follower
        run: |
          cat << 'EOF' > app/src/main/java/com/example/voxprompter/MainActivity.kt
          package com.example.voxprompter

          import android.Manifest
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.media.AudioFormat
          import android.media.AudioRecord
          import android.media.MediaRecorder
          import android.os.Bundle
          import android.speech.RecognitionListener
          import android.speech.RecognizerIntent
          import android.speech.SpeechRecognizer
          import android.widget.Button
          import android.widget.EditText
          import android.widget.ScrollView
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import java.io.File
          import java.io.FileOutputStream
          import java.io.IOException
          import java.util.Locale
          import kotlin.math.log10
          import kotlin.math.sqrt

          class MainActivity : AppCompatActivity() {

              private val REQUEST_RECORD_AUDIO_PERMISSION = 200
              private var permissionToRecordAccepted = false
              private val permissions = arrayOf(Manifest.permission.RECORD_AUDIO)

              private var audioRecord: AudioRecord? = null
              private var isRecording = false
              private var recordingThread: Thread? = null

              private val sampleRate = 44100
              private val channelConfig = AudioFormat.CHANNEL_IN_MONO
              private val audioFormat = AudioFormat.ENCODING_PCM_16BIT
              private val bufferSize = AudioRecord.getMinBufferSize(sampleRate, channelConfig, audioFormat)

              private lateinit var statusTextView: TextView
              private lateinit var recordButton: Button
              
              // عناصر المحاكي الصوتي الذكي (Teleprompter UI)
              private lateinit var prompterEditText: EditText
              private lateinit var scrollView: ScrollView
              private var speechRecognizer: SpeechRecognizer? = null
              private var recognizerIntent: Intent? = null

              private var noiseGateThresholdDb = -40.0
              private var rawAudioFile: File? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  statusTextView = findViewById(R.id.statusTextView)
                  recordButton = findViewById(R.id.recordButton)
                  
                  // ربط عناصر التمرير التلقائي بالواجهة
                  prompterEditText = findViewById(R.id.prompterEditText)
                  scrollView = findViewById(R.id.scrollView)

                  ActivityCompat.requestPermissions(this, permissions, REQUEST_RECORD_AUDIO_PERMISSION)

                  recordButton.setOnClickListener {
                      if (isRecording) {
                          stopRecordingProcess()
                          stopVoiceFollower()
                      } else {
                          if (permissionToRecordAccepted) {
                              startRecordingProcess()
                              startVoiceFollower()
                          } else {
                              Toast.makeText(this, "Permission required to record audio", Toast.LENGTH_SHORT).show()
                          }
                      }
                  }

                  // تهيئة مستشعر الصوت الذكي للغة العربية والإنجليزية تلقائياً
                  initializeSpeechRecognizer()
              }

              override fun onRequestPermissionsResult(
                  requestCode: Int,
                  permissions: Array<String>,
                  grantResults: IntArray
              ) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                  permissionToRecordAccepted = if (requestCode == REQUEST_RECORD_AUDIO_PERMISSION) {
                      grantResults.isNotEmpty() && grantResults[0] == PackageManager.PERMISSION_GRANTED
                  } else {
                      false
                  }
                  if (!permissionToRecordAccepted) finish()
              }

              private fun startRecordingProcess() {
                  if (ActivityCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                      return
                  }
                  audioRecord = AudioRecord(
                      MediaRecorder.AudioSource.MIC,
                      sampleRate,
                      channelConfig,
                      audioFormat,
                      bufferSize
                  )

                  if (audioRecord?.state != AudioRecord.STATE_INITIALIZED) {
                      statusTextView.text = "Status: Initialization Failed"
                      return
                  }

                  audioRecord?.startRecording()
                  isRecording = true
                  statusTextView.text = "Status: Follower Active..."
                  recordButton.text = "Stop"

                  rawAudioFile = File(getExternalFilesDir(null), "vox_raw_recording.pcm")

                  recordingThread = Thread({ writeAudioDataToFileWithNoiseGate() }, "AudioRecord Thread")
                  recordingThread?.start()
              }

              private fun writeAudioDataToFileWithNoiseGate() {
                  val sData = ShortArray(bufferSize / 2)
                  var os: FileOutputStream? = null
                  try {
                      os = FileOutputStream(rawAudioFile)
                  } catch (e: IOException) {
                      e.printStackTrace()
                  }

                  while (isRecording) {
                      val readSize = audioRecord?.read(sData, 0, sData.size) ?: 0
                      if (readSize > 0) {
                          var rms = 0.0
                          for (i in 0 until readSize) {
                              rms += sData[i] * sData[i]
                          }
                          rms = sqrt(rms / readSize)
                          val db = 20 * log10(rms / 32767.0)

                          if (db < noiseGateThresholdDb) {
                              for (i in 0 until readSize) {
                                  sData[i] = 0
                              }
                          }

                          try {
                              val bData = ShortArrayToByteArray(sData, readSize)
                              os?.write(bData, 0, readSize * 2)
                          } catch (e: IOException) {
                              e.printStackTrace()
                          }
                      }
                  }
                  try {
                      os?.close()
                  } catch (e: IOException) {
                      e.printStackTrace()
                  }
              }

              private fun ShortArrayToByteArray(sData: ShortArray, size: Int): ByteArray {
                  val bytes = ByteArray(size * 2)
                  for (i in 0 until size) {
                      bytes[i * 2] = (sData[i].toInt() and 0x00FF).toByte()
                      bytes[i * 2 + 1] = (sData[i].toInt() shr 8).toByte()
                  }
                  return bytes
              }

              private fun stopRecordingProcess() {
                  isRecording = false
                  audioRecord?.stop()
                  audioRecord?.release()
                  audioRecord = null
                  recordingThread = null
                  statusTextView.text = "Status: Stopped"
                  recordButton.text = "Record"
                  Toast.makeText(this, "Saved to: ${rawAudioFile?.absolutePath}", Toast.LENGTH_LONG).show()
              }

              // ==========================================
              // أجزاء المحاكي الصوتي الذكي (Voice Follower)
              // ==========================================

              private fun initializeSpeechRecognizer() {
                  if (SpeechRecognizer.isRecognitionAvailable(this)) {
                      speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this)
                      recognizerIntent = Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH).apply {
                          putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM)
                          putExtra(RecognizerIntent.EXTRA_LANGUAGE, Locale.getDefault())
                          putExtra(RecognizerIntent.EXTRA_PARTIAL_RESULTS, true) // جلب النتائج لحظة بنطوقها
                      }

                      speechRecognizer?.setRecognitionListener(object : RecognitionListener {
                          override fun onReadyForSpeech(params: Bundle?) {}
                          override fun onBeginningOfSpeech() {}
                          override fun onRmsChanged(rmsdB: Float) {}
                          override fun onBufferReceived(buffer: ByteArray?) {}
                          override fun onEndOfSpeech() {}
                          override fun onError(error: Int) {
                              // إعادة التشغيل التلقائي في حال التوقف المؤقت للاستمرار في القراءة
                              if (isRecording) {
                                  speechRecognizer?.startListening(recognizerIntent)
                              }
                          }

                          override fun onResults(results: Bundle?) {
                              processRecognizedText(results)
                              if (isRecording) {
                                  speechRecognizer?.startListening(recognizerIntent)
                              }
                          }

                          override fun onPartialResults(partialResults: Bundle?) {
                              processRecognizedText(partialResults)
                          }

                          override fun onEvent(eventType: Int, params: Bundle?) {}
                      })
                  }
              }

              private fun startVoiceFollower() {
                  runOnUiThread {
                      speechRecognizer?.startListening(recognizerIntent)
                  }
              }

              private fun stopVoiceFollower() {
                  runOnUiThread {
                      speechRecognizer?.stopListening()
                  }
              }

              private fun processRecognizedText(bundle: Bundle?) {
                  val matches = bundle?.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION)
                  if (!matches.isNullOrEmpty()) {
                      val spokenText = matches[0].lowercase(Locale.getDefault())
                      scrollTextToMatch(spokenText)
                  }
              }

              private fun scrollTextToMatch(spokenText: String) {
                  val fullText = prompterEditText.text.toString().lowercase(Locale.getDefault())
                  val words = spokenText.split(" ")
                  
                  // البحث عن آخر كلمة تم نطقها داخل النص الكامل للملقن
                  if (words.isNotEmpty()) {
                      val lastWord = words.last()
                      val wordIndex = fullText.indexOf(lastWord)
                      
                      if (wordIndex != -1) {
                          // حساب الإحداثي الصادي للسطر الذي يحتوي على الكلمة المقروءة للتمرير إليه
                          val layout = prompterEditText.layout
                          if (layout != null) {
                              val line = layout.getLineForOffset(wordIndex)
                              val yCoordinate = layout.getLineTop(line)
                              
                              // تمرير الشاشة بسلاسة للسطر المقروء
                              scrollView.smoothScrollTo(0, yCoordinate)
                          }
                      }
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  speechRecognizer?.destroy()
              }
          }
          EOF

          # 3. حفظ ودفع التعديلات
          git add app/src/main/java/com/example/voxprompter/MainActivity.kt
          git commit -m "Step 1: Integrate Voice Follower Autoscroll with SpeechRecognizer" || echo "No changes"
          git push origin main
          
