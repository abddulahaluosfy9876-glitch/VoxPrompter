name: Create Secure Ground Truth Branch

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm creating the stable backup branch'
        required: true
        default: 'NO'

permissions:
  contents: write

jobs:
  create-secure-vault:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # جلب كامل تاريخ المستودع لضمان البناء السليم للفرع الجديد

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Initialize and Push Stable Backup Branch
        run: |
          # 1. التحقق من وجود الفرع مسبقاً أو إنشائه بشكل نظيف تماماً
          git checkout -b stable-backup-base
          
          # 2. إنشاء ملف توثيقي صغير داخل الفرع لحماية النقطة المرجعية
          echo "# VoxPrompter Stable Backup Vault" > STABLE_README.md
          echo "This branch is a secure ground truth containing the verified working baseline of the application." >> STABLE_README.md
          echo "Date secured: $(date)" >> STABLE_README.md
          
          git add STABLE_README.md
          git commit -m "Identity: Secure and initialize ground-truth branch for stable backup" || echo "Branch already synchronized"
          
          # 3. رفع الفرع الجديد إلى جيتهاب ليكون الخزنة المرجعية الآمنة
          git push -u origin stable-backup-base --force
          
