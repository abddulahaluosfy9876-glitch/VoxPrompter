name: Clean Project and Revert Code

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm cleanup'
        required: true
        default: 'NO'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove duplicated folder and restore stable files
        run: |
          # 1. حذف المجلد المكرر الفاسد نهائياً من ساحة العمل
          rm -rf app/src/main/app
          
          # 2. استرجاع كود MainActivity السليم من الكوميت المستقر
          git checkout 5cec4bc14508d7d749ab0d44c6467e20d7bd37e9 -- app/src/main/java/
          
          # 3. حفظ التغييرات ودفعها بشكل طبيعي وآمن دون المساس بملفات الـ workflows
          git add -A
          git commit -m "Clean project structure and restore stable Java/Kotlin source files" || echo "No changes to commit"
          git push origin main
          
