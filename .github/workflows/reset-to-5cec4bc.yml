name: Restore MainActivity Only

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm'
        required: true
        default: 'NO'

permissions:
  contents: write

jobs:
  restore-file:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and restore stable MainActivity
        run: |
          # 1. جلب التعديل المستقر fcdabfa للتأكد من وجوده محلياً في الخادم
          git fetch origin fcdabfa11d61992df95c47932ee4e976db5767c2
          
          # 2. استخراج ملف MainActivity.kt السليم فقط من ذلك التعديل
          git checkout fcdabfa11d61992df95c47932ee4e976db5767c2 -- app/src/main/java/com/example/voxprompter/MainActivity.kt
          
          # 3. حفظ التعديل ودقعه للفرع الرئيسي
          git add app/src/main/java/com/example/voxprompter/MainActivity.kt
          git commit -m "Success: Restore MainActivity.kt to stable version (4.54 KB)" || echo "No changes"
          git push origin main
          
